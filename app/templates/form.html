{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto bg-gray-900 p-8 rounded-xl border border-gray-800 shadow-xl">
    <h1 class="text-2xl font-black text-white mb-6">{% if auto %}Editar Vehículo{% else %}Nuevo Vehículo{% endif %}</h1>
    
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Marca</label>
            <input type="text" name="marca" value="{{ auto.marca if auto else '' }}" required class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 text-white focus:border-red-500 outline-none">
        </div>
        <div>
            <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Modelo</label>
            <input type="text" name="modelo" value="{{ auto.modelo if auto else '' }}" required class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 text-white focus:border-red-500 outline-none">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Año</label>
                <input type="number" name="anio" value="{{ auto.anio if auto else 2026 }}" required class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 text-white focus:border-red-500 outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Precio ($)</label>
                <input type="number" step="0.01" name="precio" value="{{ auto.precio if auto else '' }}" required class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 text-white focus:border-red-500 outline-none">
            </div>
        </div>
        <div>
            <label class="block text-xs font-bold uppercase text-gray-400 mb-1">URL de Imagen</label>
            <input type="url" name="imagen_url" value="{{ auto.imagen_url if auto else '' }}" placeholder="https://..." class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 text-white focus:border-red-500 outline-none">
        </div>
        <div class="flex justify-end space-x-3 pt-4 border-t border-gray-800">
            <a href="/portal" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-4 py-2 rounded-lg text-sm transition">Volver</a>
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold px-5 py-2 rounded-lg text-sm transition">Guardar</button>
        </div>
    </form>
</div>
{% endblock %}
